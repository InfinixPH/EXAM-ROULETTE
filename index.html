<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOT 70 | Exam Roulette</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Bebas+Neue&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --orange: #FF5A1F;
  --orange2: #FF8C42;
  --orange3: #FFB347;
  --purple: #6C3FC5;
  --purple2: #9B5DE5;
  --purple3: #C77DFF;
  --dark: #1A0A2E;
  --darker: #0D0519;
  --white: #FFF8F0;
  --cream: #FFE8D6;
}
body {
  min-height: 100vh;
  overflow-x: hidden;
  font-family: 'Nunito', 'Segoe UI', sans-serif;
  color: var(--white);
  position: relative;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px 16px 40px;
}

/* ── BACKGROUND ── */
.bg-comic {
  position: fixed; inset: 0;
  background-image: url('BG (1).png');
  background-size: cover; background-position: center;
  z-index: 0;
}
.bg-overlay {
  position: fixed; inset: 0;
  background: linear-gradient(135deg,rgba(13,5,25,0.80) 0%,rgba(108,63,197,0.50) 40%,rgba(255,90,31,0.32) 70%,rgba(13,5,25,0.88) 100%);
  z-index: 1;
}
/* Halftone dot overlay */
.halftone {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  background-image: radial-gradient(circle, rgba(255,140,66,0.18) 1.2px, transparent 1.2px);
  background-size: 18px 18px;
  mix-blend-mode: screen;
}

/* ── PHONE RENDERS ── */
.phone-left {
  position: fixed; left: -40px; bottom: -20px;
  width: 420px; opacity: 0.62; z-index: 3;
  transform: rotate(-14deg) scaleX(-1);
  pointer-events: none;
  filter: drop-shadow(0 0 30px rgba(255,90,31,0.55)) drop-shadow(-8px 0 24px rgba(255,90,31,0.3));
}
.phone-right {
  position: fixed; right: -50px; top: 20px;
  width: 460px; opacity: 0.55; z-index: 3;
  transform: rotate(11deg);
  pointer-events: none;
  filter: drop-shadow(0 0 30px rgba(155,93,229,0.65)) drop-shadow(8px 0 24px rgba(108,63,197,0.4));
}

/* ── MAIN CONTAINER ── */
.container {
  position: relative; z-index: 10;
  width: 100%; max-width: 660px; margin: 0 auto;
}

/* ── HEADER ── */
.header { text-align: center; margin-bottom: 16px; }
.infinix-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.78rem; letter-spacing: 5px;
  color: rgba(255,232,214,0.65);
  text-transform: uppercase; margin-bottom: 6px;
}

/* Action-lines logo wrap */
.logo-action-wrap {
  display: inline-block; position: relative;
  margin-bottom: 12px; padding: 0 10px;
}
.action-lines {
  position: absolute; inset: -28px;
  z-index: 0; pointer-events: none;
}
.action-lines line {
  stroke: rgba(255,140,66,0.45); stroke-width: 2;
  stroke-linecap: round;
}
.logo-panel {
  position: relative; z-index: 1;
  display: inline-block;
  background: rgba(13,5,25,0.82);
  border: 3px solid var(--orange);
  border-radius: 14px; padding: 10px 32px 8px;
  backdrop-filter: blur(14px);
  box-shadow:
    0 0 0 2px rgba(199,125,255,0.3),
    0 0 35px rgba(255,90,31,0.40),
    inset 0 0 20px rgba(255,140,66,0.08),
    5px 5px 0 rgba(108,63,197,0.65);
  overflow: hidden;
}
.logo-panel::before {
  content: ''; position: absolute; top:0; left:-100%;
  width:55%; height:100%;
  background: linear-gradient(90deg,transparent,rgba(255,255,255,0.16),transparent);
  animation: sheen 3.5s ease-in-out infinite;
}
@keyframes sheen { 0%{left:-100%} 50%{left:130%} 100%{left:130%} }
.hot70-logo {
  height: 54px; width: auto; display: block;
  filter: drop-shadow(0 0 12px rgba(255,140,66,0.8));
}

.title-comic {
  font-family: 'Bangers', Impact, sans-serif;
  font-size: clamp(2.8rem, 9vw, 4.4rem);
  line-height: 0.9; letter-spacing: 4px; text-transform: uppercase;
  background: linear-gradient(160deg, #FFE8D6 0%, #FF8C42 30%, #FF5A1F 55%, #C77DFF 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  filter: drop-shadow(3px 3px 0px rgba(108,63,197,0.85)) drop-shadow(0 0 22px rgba(255,90,31,0.35));
  margin-bottom: 6px;
}
.subtitle-tag {
  display: inline-block;
  background: linear-gradient(90deg, var(--orange), var(--purple2));
  color: var(--white); font-family: 'Bebas Neue', sans-serif;
  font-size: 0.75rem; letter-spacing: 3px; padding: 4px 16px;
  border-radius: 999px; text-transform: uppercase;
  box-shadow: 0 0 16px rgba(255,90,31,0.4), 3px 3px 0 rgba(108,63,197,0.5);
}

/* ── COMIC CARD ── */
.comic-card {
  background: rgba(13,5,25,0.80);
  backdrop-filter: blur(22px);
  border-radius: 26px;
  border: 3px solid rgba(255,90,31,0.60);
  box-shadow:
    0 0 0 1px rgba(199,125,255,0.20),
    0 0 50px rgba(255,90,31,0.20),
    inset 0 0 30px rgba(108,63,197,0.08),
    7px 7px 0 rgba(108,63,197,0.50);
  padding: 22px; margin-bottom: 16px;
  position: relative; overflow: hidden;
}
.comic-card::before {
  content: ''; position: absolute; top:0; left:0; right:0; height:3px;
  background: linear-gradient(90deg, var(--orange), var(--purple2), var(--orange2));
}

/* ── WHEEL ── */
.wheel-outer {
  display: flex; justify-content: center; margin: 4px 0 18px;
  position: relative;
}
.wheel-ring {
  position: relative; width: 320px; height: 320px; border-radius: 50%;
  box-shadow:
    0 0 0 5px rgba(255,90,31,0.75),
    0 0 0 10px rgba(199,125,255,0.28),
    0 0 60px rgba(255,90,31,0.38),
    0 0 110px rgba(108,63,197,0.22);
}
canvas {
  position: absolute; top:0; left:0;
  width:100% !important; height:100% !important;
  border-radius: 50%;
}
.pointer-wrap {
  position: absolute; top:-22px; left:50%;
  transform: translateX(-50%); z-index: 20;
  display: flex; flex-direction: column; align-items: center;
}
.pointer-tri {
  width:0; height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-top:32px solid #FF5A1F;
  filter: drop-shadow(0 0 10px rgba(255,90,31,0.95));
}
.pointer-dot {
  width:11px; height:11px; background:var(--orange2);
  border-radius:50%; margin-top:-5px;
  box-shadow: 0 0 14px rgba(255,140,66,1);
}

/* ── SPIN BUTTON ── */
.spin-btn {
  display: block; width: min(380px,90%);
  margin: 0 auto 12px; padding: 15px 20px;
  font-family: 'Bangers', Impact, sans-serif;
  font-size: 1.55rem; letter-spacing: 3px; text-transform: uppercase;
  cursor: pointer; border-radius: 16px;
  border: 3px solid rgba(255,200,100,0.6);
  background: linear-gradient(135deg, #FF5A1F 0%, #FF8C42 45%, #9B5DE5 100%);
  color: var(--white); text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
  box-shadow:
    0 0 24px rgba(255,90,31,0.45),
    4px 4px 0 rgba(108,63,197,0.65),
    inset 0 1px 0 rgba(255,255,255,0.28);
  transition: all 0.18s ease; position: relative; overflow: hidden;
}
.spin-btn::after {
  content:''; position:absolute; top:0; left:-80%;
  width:55%; height:100%;
  background: linear-gradient(90deg,transparent,rgba(255,255,255,0.35),transparent);
  transform:skewX(-20deg); transition:0.5s;
}
.spin-btn:hover::after { left:130%; }
.spin-btn:hover { transform:translate(-2px,-3px) scale(1.02); box-shadow:0 0 40px rgba(255,90,31,0.65),7px 7px 0 rgba(108,63,197,0.7); }
.spin-btn:active { transform:translate(2px,2px); box-shadow:1px 1px 0 rgba(108,63,197,0.5); }
.spin-btn:disabled { opacity:0.45; cursor:not-allowed; transform:none; }

/* ── RESULT CARD ── */
.result-card {
  background: linear-gradient(145deg,rgba(255,90,31,0.10),rgba(108,63,197,0.12));
  border: 2px solid rgba(255,140,66,0.38); border-radius: 20px;
  padding: 16px; text-align: center;
  box-shadow: inset 0 0 22px rgba(255,90,31,0.06), 3px 3px 0 rgba(108,63,197,0.35);
  transition: transform 0.2s ease; position: relative; overflow: visible;
}
.result-label {
  font-family: 'Bebas Neue', sans-serif; font-size: 0.65rem;
  letter-spacing: 3px; color: var(--orange2); margin-bottom: 6px; text-transform: uppercase;
}
.result-text {
  font-family: 'Bangers', Impact, sans-serif; font-size: 2.6rem; letter-spacing: 3px;
  background: linear-gradient(135deg, #FFE8D6, #FF8C42 50%, #C77DFF);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  filter: drop-shadow(2px 2px 0 rgba(108,63,197,0.55)); margin: 4px 0;
}
.open-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, var(--orange), var(--purple2));
  color: var(--white); font-family: 'Bebas Neue', sans-serif;
  font-size: 1.05rem; letter-spacing: 2px; padding: 10px 26px;
  border-radius: 12px; text-decoration: none; margin-top: 10px;
  box-shadow: 3px 3px 0 rgba(108,63,197,0.65), 0 0 22px rgba(255,90,31,0.38);
  transition: 0.2s; border: 2px solid rgba(255,255,255,0.22);
}
.open-btn:hover { transform:translate(-2px,-2px); box-shadow:6px 6px 0 rgba(108,63,197,0.8),0 0 32px rgba(255,90,31,0.55); }

/* ── POW BUBBLE ── */
.pow-bubble {
  display: none;
  position: absolute;
  top: -60px; left: 50%; transform: translateX(-50%) scale(0) rotate(-8deg);
  z-index: 100; pointer-events: none;
  font-family: 'Bangers', Impact, sans-serif;
  font-size: 2.4rem; letter-spacing: 3px;
  color: #1A0A2E;
  background: radial-gradient(ellipse at 50% 55%, #FFD700 60%, #FF8C42 100%);
  padding: 12px 28px 14px;
  border-radius: 50%;
  border: 4px solid #FF5A1F;
  box-shadow: 4px 4px 0 rgba(108,63,197,0.8), 0 0 30px rgba(255,215,0,0.6);
  white-space: nowrap;
}
.pow-bubble.show {
  display: block;
  animation: powPop 1.4s cubic-bezier(0.36,0.07,0.19,0.97) forwards;
}
/* Spiky bubble teeth via clip-path skipped — using CSS star shape instead */
.pow-bubble::before {
  content: '';
  position: absolute; inset: -14px;
  background: inherit;
  border-radius: 50%;
  z-index: -1;
  clip-path: polygon(
    50% 0%,58% 6%,65% 2%,70% 9%,78% 6%,80% 14%,88% 13%,87% 22%,95% 23%,92% 31%,100% 35%,95% 42%,100% 48%,94% 53%,97% 60%,90% 63%,91% 71%,83% 72%,82% 80%,74% 79%,70% 87%,62% 84%,57% 91%,50% 88%,43% 91%,38% 84%,30% 87%,26% 79%,18% 80%,17% 72%,9% 71%,10% 63%,3% 60%,6% 53%,0% 48%,5% 42%,0% 35%,8% 31%,5% 23%,13% 22%,12% 13%,20% 14%,22% 6%,30% 9%,35% 2%,42% 6%
  );
}
@keyframes powPop {
  0%   { transform:translateX(-50%) scale(0) rotate(-8deg); opacity:0; }
  18%  { transform:translateX(-50%) scale(1.25) rotate(4deg); opacity:1; }
  32%  { transform:translateX(-50%) scale(0.95) rotate(-3deg); opacity:1; }
  46%  { transform:translateX(-50%) scale(1.08) rotate(2deg); opacity:1; }
  65%  { transform:translateX(-50%) scale(1.0) rotate(0deg); opacity:1; }
  85%  { transform:translateX(-50%) scale(1.0) rotate(0deg); opacity:1; }
  100% { transform:translateX(-50%) scale(0.8) rotate(5deg); opacity:0; }
}

/* ── CONFETTI ── */
.confetti-container {
  position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden;
}
.confetti-piece {
  position: absolute;
  width: 12px; height: 12px;
  opacity: 0;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 1; }
  80%  { opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg) scale(0.5); opacity: 0; }
}

/* ── META & HISTORY ── */
.meta-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 4px 4px; font-size: 0.68rem;
  color: rgba(255,232,214,0.45); letter-spacing: 1px; text-transform: uppercase;
  font-family: 'Bebas Neue', sans-serif;
}
.history-section { border-top: 1px solid rgba(255,90,31,0.18); padding-top: 12px; }
.history-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 0.65rem; letter-spacing: 3px;
  color: rgba(199,125,255,0.55); text-align: center; margin-bottom: 8px; text-transform: uppercase;
}
.history-pills { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
.history-pill {
  background: rgba(255,90,31,0.13); border:1px solid rgba(255,90,31,0.32);
  border-radius:999px; padding:4px 14px; font-size:0.68rem; color:var(--cream);
  box-shadow: 2px 2px 0 rgba(108,63,197,0.28); letter-spacing:0.5px;
}

@media (max-width:500px) {
  .phone-left { width:280px; left:-30px; opacity:0.45; }
  .phone-right { width:300px; right:-30px; opacity:0.38; }
  .wheel-ring { width:268px; height:268px; }
  .title-comic { font-size:2.5rem; }
  .spin-btn { font-size:1.25rem; padding:13px; }
  .result-text { font-size:2rem; }
}
</style>
</head>
<body>

<div class="bg-comic"></div>
<div class="bg-overlay"></div>
<div class="halftone"></div>
<img src="PHONE RENDER.png" class="phone-left" alt="">
<img src="PHONE RENDER.png" class="phone-right" alt="">
<div class="confetti-container" id="confettiContainer"></div>

<div class="container">
  <div class="header">
    <div class="infinix-badge">Infinix</div>

    <!-- Action-lines logo panel -->
    <div class="logo-action-wrap">
      <svg class="action-lines" viewBox="0 0 260 120" xmlns="http://www.w3.org/2000/svg">
        <!-- radiating lines from center -->
        <line x1="130" y1="60" x2="0"   y2="0"/>
        <line x1="130" y1="60" x2="30"  y2="0"/>
        <line x1="130" y1="60" x2="65"  y2="0"/>
        <line x1="130" y1="60" x2="100" y2="0"/>
        <line x1="130" y1="60" x2="130" y2="0"/>
        <line x1="130" y1="60" x2="160" y2="0"/>
        <line x1="130" y1="60" x2="195" y2="0"/>
        <line x1="130" y1="60" x2="230" y2="0"/>

        <line x1="130" y1="60" x2="100" y2="120"/>

        <line x1="130" y1="60" x2="195" y2="120"/>
        <line x1="130" y1="60" x2="230" y2="120"/>
        <line x1="130" y1="60" x2="260" y2="120"/>
        <line x1="130" y1="60" x2="0"   y2="30"/>
        <line x1="130" y1="60" x2="0"   y2="60"/>
        <line x1="130" y1="60" x2="0"   y2="90"/>
        <line x1="130" y1="60" x2="260" y2="30"/>

      </svg>

      <div class="history-title">Recently Selected</div>

<script>
const SETS = [
  {name:"Set 1",  url:"https://docs.google.com/forms/d/e/1FAIpQLScVDslhDDeEL7tONrqcYJ84uFtS6FMVjCU1ScBNS_3lzfRHDA/viewform?usp=header"},
  {name:"Set 2",  url:"https://docs.google.com/forms/d/e/1FAIpQLSdYYfyQTGGsW4WwbhaSdjHZajU1CUTcMNA7oXGA352RskvTpA/viewform?usp=header"},
  {name:"Set 3",  url:"https://docs.google.com/forms/d/e/1FAIpQLScgqvVtJxqChg2GHzc8-og_B6dec1Gk853Z0qItp_ZOZP6WDg/viewform?usp=header"},
  {name:"Set 4",  url:"https://docs.google.com/forms/d/e/1FAIpQLSeuaTJOP49uRj2rjD3-WEJzQBxF40GqwP6nLsEBCw3XpZKnAg/viewform?usp=header"},
  {name:"Set 5",  url:"https://docs.google.com/forms/d/e/1FAIpQLScPvXNQp-YERnWVBKdApQ2ugE0LSrNE9rZicC680DNj_7hjqw/viewform?usp=header"},
  {name:"Set 6",  url:"https://forms.gle/9oBSpuCd4Nriw9Q98"},
  {name:"Set 7",  url:"https://forms.gle/hvZnJCzj11zJAdqN6"},
  {name:"Set 8",  url:"https://forms.gle/C9yR4AkckJ3NRAqD7"},
  {name:"Set 9",  url:"https://forms.gle/YsBhPbS11t7VEFzW7"},
  {name:"Set 10", url:"https://forms.gle/xXL3v6DhTQtKw67E9"},
  {name:"Set 11", url:"https://forms.gle/NLNNVkHuEDwfSepv5"},
  {name:"Set 12", url:"https://forms.gle/LbKMec16UaX91zVu5"},
  {name:"Set 13", url:"https://forms.gle/sPK2sTuLuJ3pzpPk6"},
  {name:"Set 14", url:"https://forms.gle/Gf9mUqjzMeiBdtrE7"},
  {name:"Set 15", url:"https://forms.gle/TgQPDUB3o2UuTgGLA"}
];

const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const TAU = Math.PI * 2;
const SEG = SETS.length;
const SEG_ANG = TAU / SEG;

// High-contrast alternating: orange / white / purple / white / ...
const COLORS     = ['#FF5A1F','#F5F0FF','#6C3FC5','#FFF4E8','#FF8C42','#EEE8FF','#9B5DE5','#FFF8F0','#C7490A','#D4C0FF','#FF6B35','#E8E0FF','#7B4FD0','#FFE4CC','#8B45E0'];
const TEXT_DARK  = '#1A0A2E';
const TEXT_LIGHT = '#FFF8F0';
const TEXT_CLR   = [TEXT_LIGHT, TEXT_DARK, TEXT_LIGHT, TEXT_DARK, TEXT_DARK, TEXT_DARK, TEXT_LIGHT, TEXT_DARK, TEXT_LIGHT, TEXT_DARK, TEXT_LIGHT, TEXT_DARK, TEXT_LIGHT, TEXT_DARK, TEXT_LIGHT];

let rot = Math.random() * TAU;
let spinning = false, spinCount = 0, history = [];
let audioCtx = null, lastTick = 0;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playTick(vol=0.16, freq=900) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'square'; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.04);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+0.045);
}
function playLand() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  [0,0.1,0.22].forEach((t,i) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type='triangle'; o.frequency.value=[660,880,1100][i];
    g.gain.setValueAtTime(0.22,now+t);
    g.gain.exponentialRampToValueAtTime(0.001,now+t+0.2);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(now+t); o.stop(now+t+0.22);
  });
}

function drawWheel(r) {
  const sz=canvas.width, cx=sz/2, cy=sz/2, rad=sz/2-18;
  ctx.clearRect(0,0,sz,sz);

  // Outer glow disc
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,rad+14,0,TAU);
  ctx.fillStyle='rgba(255,90,31,0.10)';
  ctx.shadowColor='rgba(255,90,31,0.6)'; ctx.shadowBlur=28;
  ctx.fill(); ctx.restore();

  // Segments
  for(let i=0;i<SEG;i++) {
    const s=i*SEG_ANG+r, e=s+SEG_ANG;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,rad,s,e); ctx.closePath();
    ctx.fillStyle=COLORS[i]; ctx.fill();

    // Sheen
    const gs=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
    gs.addColorStop(0,'rgba(255,255,255,0.28)');
    gs.addColorStop(0.45,'rgba(255,255,255,0.06)');
    gs.addColorStop(1,'rgba(0,0,0,0.25)');
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,rad,s,e); ctx.closePath();
    ctx.fillStyle=gs; ctx.fill();

    // Divider lines
    ctx.save();
    ctx.strokeStyle='rgba(80,30,80,0.55)'; ctx.lineWidth=2.5;
    ctx.shadowColor='rgba(0,0,0,0.4)'; ctx.shadowBlur=3;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,rad,s,e); ctx.closePath();
    ctx.stroke(); ctx.restore();

    // Bold label with outline for contrast
    ctx.save();
    ctx.translate(cx,cy); ctx.rotate(s+SEG_ANG/2);
    const fs = Math.min(18, rad/4.8);
    ctx.font = `900 ${fs}px 'Nunito','Segoe UI'`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    // Outline
    ctx.strokeStyle = TEXT_CLR[i] === TEXT_LIGHT ? 'rgba(0,0,0,0.7)' : 'rgba(255,255,255,0.7)';
    ctx.lineWidth=4; ctx.lineJoin='round';
    ctx.strokeText(SETS[i].name, rad*0.62, 0);
    // Fill
    ctx.fillStyle=TEXT_CLR[i];
    ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=4;
    ctx.fillText(SETS[i].name, rad*0.62, 0);
    ctx.restore();
  }

  // Tick marks around rim
  const tickCount = SEG * 4; // 4 ticks per segment
  for(let i=0;i<tickCount;i++) {
    const angle = (i / tickCount) * TAU + r;
    const isMajor = i % 4 === 0;
    const outerR = rad + 2;
    const innerR = rad - (isMajor ? 14 : 7);
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(innerR, 0); ctx.lineTo(outerR, 0);
    ctx.strokeStyle = isMajor ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.45)';
    ctx.lineWidth = isMajor ? 3 : 1.5;
    ctx.shadowColor = 'rgba(255,200,100,0.8)'; ctx.shadowBlur = isMajor ? 8 : 3;
    ctx.stroke(); ctx.restore();
  }

  // Dot ring just inside the rim
  const dotCount = SEG * 3;
  for(let i=0;i<dotCount;i++) {
    const angle = (i / dotCount) * TAU + r;
    const dr = rad - 22;
    const dx = cx + Math.cos(angle) * dr;
    const dy = cy + Math.sin(angle) * dr;
    ctx.save();
    ctx.beginPath(); ctx.arc(dx, dy, 3, 0, TAU);
    ctx.fillStyle = i % 3 === 0 ? 'rgba(255,180,60,0.85)' : 'rgba(255,255,255,0.45)';
    ctx.shadowColor='rgba(255,180,60,0.6)'; ctx.shadowBlur=6;
    ctx.fill(); ctx.restore();
  }

  // Center hub
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,44,0,TAU);
  ctx.fillStyle='#0D0519';
  ctx.shadowColor='rgba(255,90,31,0.9)'; ctx.shadowBlur=20;
  ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,32,0,TAU);
  const hg = ctx.createRadialGradient(cx,cy,0,cx,cy,32);
  hg.addColorStop(0,'#FF8C42'); hg.addColorStop(1,'#FF5A1F');
  ctx.fillStyle=hg; ctx.fill();
  ctx.fillStyle='#FFF8F0';
  ctx.font='bold 13px "Nunito"'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=5;
  ctx.fillText('HOT',cx,cy-7); ctx.fillText('70',cx,cy+8);
  ctx.restore();
}

function getIdx(r) {
  let a=(-Math.PI/2-r)%TAU; if(a<0) a+=TAU;
  return Math.min(Math.floor(a/SEG_ANG),SEG-1);
}
function rotForIdx(idx) {
  const ptr=-Math.PI/2, ctr=idx*SEG_ANG+SEG_ANG/2;
  return ((ptr-ctr)%TAU+TAU)%TAU;
}

// ── CONFETTI ──
const CONFETTI_SHAPES = ['★','●','■','▲','♦'];
const CONFETTI_COLORS = ['#FF5A1F','#FFD700','#C77DFF','#FF8C42','#FFF8F0','#9B5DE5','#FFB347'];
function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  container.innerHTML = '';
  for(let i=0;i<55;i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.textContent = CONFETTI_SHAPES[Math.floor(Math.random()*CONFETTI_SHAPES.length)];
    el.style.cssText = `
      left: ${20+Math.random()*60}%;
      top: ${30+Math.random()*20}%;
      font-size: ${10+Math.random()*16}px;
      color: ${CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)]};
      animation-duration: ${1.2+Math.random()*1.6}s;
      animation-delay: ${Math.random()*0.4}s;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
    `;
    container.appendChild(el);
  }
  setTimeout(()=>container.innerHTML='', 3000);
}

// ── POW BUBBLE ──
const WORDS = ['POW!','BAM!','WOW!','YAY!','🔥'];
function showPow() {
  const el = document.getElementById('powBubble');
  el.textContent = WORDS[Math.floor(Math.random()*WORDS.length)];
  el.classList.remove('show');
  void el.offsetWidth; // reflow
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 1500);
}

let startRot, targetRot, spinStart, spinDur;
function animate(now) {
  const elapsed=now-spinStart, t=Math.min(1,elapsed/spinDur);
  const ease=1-Math.pow(1-t,3.8);
  rot=(startRot+(targetRot-startRot)*ease)%TAU;
  drawWheel(rot);
  if(audioCtx) {
    const delay=28+t*165;
    if(now-lastTick>delay) { playTick(0.19-t*0.08, 1080-t*480); lastTick=now; }
  }
  if(t<1) { requestAnimationFrame(animate); return; }
  rot=targetRot%TAU; drawWheel(rot);
  const idx=getIdx(rot); showResult(SETS[idx]); playLand();
  spinning=false; document.getElementById('spinBtn').disabled=false;
}

function showResult(set) {
  document.getElementById('resultText').textContent=set.name;
  document.getElementById('linkWrap').innerHTML=
    `<a href="${set.url}" target="_blank" class="open-btn">OPEN ${set.name} →</a>`;
  history.unshift(set.name); if(history.length>5) history.pop();
  document.getElementById('historyPills').innerHTML=
    history.map(n=>`<div class="history-pill">${n}</div>`).join('');
  spinCount++; document.getElementById('spinCount').textContent=`📊 Spins: ${spinCount}`;
  const card=document.getElementById('resultCard');
  card.style.transform='scale(1.04)'; setTimeout(()=>card.style.transform='scale(1)',200);
  launchConfetti();
  showPow();
}

document.getElementById('spinBtn').onclick=()=>{
  if(spinning) return;
  initAudio(); spinning=true; lastTick=0;
  document.getElementById('spinBtn').disabled=true;
  const idx=Math.floor(Math.random()*SEG);
  startRot=rot; targetRot=rotForIdx(idx)+(8+Math.random()*7)*TAU;
  spinStart=performance.now(); spinDur=3400+Math.random()*900;
  requestAnimationFrame(animate);
};

drawWheel(rot);
</script>
